name: Auto-Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: [INIT] Checkout Repository
        uses: actions/checkout@v4

      - name: [ENV] Generate Precision Timestamp
        id: vars
        run: |
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          echo "tag_name=v${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "release_name=Release_${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "zip_name=HexGem_Extension_${TIMESTAMP}.zip" >> $GITHUB_OUTPUT

      - name: [BUILD] Archive Extension Package
        run: |
          zip -r ${{ steps.vars.outputs.zip_name }} . \
            -x "*.git*" \
            -x ".github*" \

      - name: [DEPLOY] Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: ${{ steps.vars.outputs.release_name }}
          body: |
            ### [AUTOMATED BUILD]
            - **Build ID**: ${{ github.run_id }}
            - **Triggered By**: ${{ github.event_name }}
            - **Timestamp**: ${{ steps.vars.outputs.tag_name }}
          files: ${{ steps.vars.outputs.zip_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
